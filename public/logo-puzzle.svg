<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Top-left piece: tab right + tab bottom -->
    <clipPath id="tl">
      <path d="M0 6 Q0 0 6 0 H72 V32 Q80 32 80 40 Q80 48 72 48 V80 H48 Q48 88 40 88 Q32 88 32 80 H0 Z"/>
    </clipPath>
    <!-- Top-right piece: indent left + tab bottom -->
    <clipPath id="tr">
      <path d="M8 0 H74 Q80 0 80 6 V80 H48 Q48 88 40 88 Q32 88 32 80 H0 V48 Q-8 48 -8 40 Q-8 32 0 32 V0 Z"/>
    </clipPath>
    <!-- Bottom-left piece: tab right + indent top -->
    <clipPath id="bl">
      <path d="M0 0 H32 Q32 -8 40 -8 Q48 -8 48 0 H80 V72 Q80 80 74 80 H0 Q0 80 0 74 V48 Z"/>
    </clipPath>
    <!-- Bottom-right piece: indent left + indent top -->
    <clipPath id="br">
      <path d="M0 0 H32 Q32 -8 40 -8 Q48 -8 48 0 H80 V74 Q80 80 74 80 H6 Q0 80 0 74 V48 Q-8 48 -8 40 Q-8 32 0 32 Z"/>
    </clipPath>
  </defs>

  <!-- Top-left: C -->
  <g clip-path="url(#tl)">
    <rect width="80" height="80" fill="#1a2a3a"/>
    <text x="36" y="50" fill="#e0e0e0" font-family="Georgia,serif" font-size="34" font-weight="bold" text-anchor="middle">C</text>
  </g>

  <!-- Top-right: V (slightly offset) -->
  <g transform="translate(82, -1) rotate(0.6, 40, 40)" clip-path="url(#tr)">
    <rect width="80" height="80" fill="#253545"/>
    <text x="38" y="50" fill="#e0e0e0" font-family="Georgia,serif" font-size="34" font-weight="bold" text-anchor="middle">V</text>
  </g>

  <!-- Bottom-left: R -->
  <g transform="translate(0, 82)" clip-path="url(#bl)">
    <rect width="80" height="80" fill="#1a2a3a"/>
    <text x="36" y="50" fill="#e0e0e0" font-family="Georgia,serif" font-size="34" font-weight="bold" text-anchor="middle">R</text>
  </g>

  <!-- Bottom-right: D -->
  <g transform="translate(82, 82)" clip-path="url(#br)">
    <rect width="80" height="80" fill="#253545"/>
    <text x="38" y="50" fill="#e0e0e0" font-family="Georgia,serif" font-size="34" font-weight="bold" text-anchor="middle">D</text>
  </g>

  <!-- Gold cross seams -->
  <line x1="0" y1="80" x2="160" y2="80" stroke="#b8860b" stroke-width="0.8" opacity="0.4"/>
  <line x1="80" y1="0" x2="80" y2="160" stroke="#b8860b" stroke-width="0.8" opacity="0.4"/>
</svg>
